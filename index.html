<style>
  :root{
    --bg:#14161A; --panel:#1B1E23; --panelAlt:#22262C; --border:#2C3139;
    --text:#ECEDEF; --muted:#878D97; --mutedFaint:#5B6068;
    --accent:#2DD4BF; --accentDim:#134E4A; --warn:#F5A623; --warnDim:#4A3413;
    --danger:#F0473E; --dangerDim:#4A1613; --machine:#3B82F6; --machineDim:#152A4A;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--text);font-family:'Prompt',sans-serif;-webkit-font-smoothing:antialiased;}
  .head{font-family:'Prompt',sans-serif;}
  .mono{font-family:'Prompt',sans-serif;}
  .wrap{max-width:1180px;margin:0 auto;padding:0 24px 40px;}
  .topbar{position:sticky;top:0;background:radial-gradient(ellipse at 8% 50%, rgba(45,212,191,0.18), transparent 60%), var(--bg);border-bottom:1px solid var(--border);z-index:20;}
  .topbar-inner{max-width:1180px;margin:0 auto;padding:20px 24px 0;}
  .brand{display:flex;align-items:center;gap:10px;}
  .brand .icon{background:var(--accentDim);border-radius:10px;padding:10px;display:flex;align-items:center;justify-content:center;color:var(--accent);font-size:26px;box-shadow:0 0 14px #2DD4BF55;}
  .row{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
  @media (max-width:480px){
    .topbar-inner{padding:14px 14px 0;}
    .row{flex-wrap:wrap;row-gap:10px;}
    .brand .icon{font-size:19px;padding:8px;border-radius:8px;}
    .brand .head{font-size:17px !important;}
    #btnAdd{padding:8px 10px;font-size:12px;white-space:nowrap;}
    .row > div:last-child{gap:8px !important;}
  }
  .btn{border:none;cursor:pointer;font-family:'Prompt',sans-serif;font-weight:600;border-radius:8px;padding:9px 14px;font-size:13px;display:inline-flex;align-items:center;gap:6px;}
  .btn-accent{background:var(--accent);color:#0A0C0E;}
  .btn-ghost{background:var(--panelAlt);color:var(--text);border:1px solid var(--border);}
  .btn-danger{background:var(--dangerDim);color:var(--danger);border:1px solid #F0473E44;}
  .tabs{display:flex;gap:4px;border-bottom:1px solid var(--border);}
  .tab{background:none;border:none;color:var(--muted);padding:10px 12px;font-size:13px;font-weight:600;cursor:pointer;border-bottom:2px solid transparent;display:flex;align-items:center;gap:6px;}
  .tab.active{color:var(--accent);border-bottom-color:var(--accent);}
  .badge{background:var(--danger);color:#fff;border-radius:10px;font-size:10px;padding:1px 6px;font-family:'Prompt',sans-serif;}
  .content{padding-top:20px;}
  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:24px;}
  .stat{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:14px;}
  .stat .lbl{color:var(--muted);font-size:11px;}
  .stat .val{font-family:'Prompt',sans-serif;font-size:24px;margin-top:6px;}
  .section-title{font-family:'Prompt',sans-serif;font-size:14px;font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:6px;}
  .card-list{display:flex;flex-direction:column;gap:8px;}
  .low-card{display:flex;align-items:center;gap:12px;padding:12px;background:var(--dangerDim);border:1px solid #F0473E44;border-radius:10px;}
  .thumb{width:48px;height:48px;border-radius:8px;object-fit:cover;flex-shrink:0;border:1px solid var(--border);background:var(--panelAlt);}
  .thumb-ph{width:40px;height:40px;border-radius:8px;background:var(--panelAlt);display:flex;align-items:center;justify-content:center;color:var(--mutedFaint);flex-shrink:0;font-size:16px;}
  .grow{flex:1;min-width:0;}
  .truncate{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .search{position:relative;margin-bottom:16px;}
  .search input{width:100%;padding:10px 12px 10px 36px;}
  .search .icon{position:absolute;left:12px;top:11px;color:var(--mutedFaint);}
  input,textarea,select{background:var(--panelAlt);border:1px solid var(--border);border-radius:8px;padding:10px 12px;color:var(--text);font-family:'Prompt',sans-serif;font-size:14px;outline:none;width:100%;}
  input:focus,textarea:focus,select:focus{border-color:var(--accent);}
  label.field{display:block;font-size:12px;color:var(--muted);margin-bottom:6px;}
  .field-wrap{margin-bottom:14px;}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
  .parts-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;}
  @media(min-width:600px){.parts-grid{grid-template-columns:repeat(3,1fr);}}
  @media(min-width:900px){.parts-grid{grid-template-columns:repeat(4,1fr);}}
  .part-card{background:var(--panel);border:1px solid var(--border);border-radius:12px;overflow:hidden;}
  .part-photo{aspect-ratio:4/3;background:var(--panelAlt);position:relative;display:flex;align-items:center;justify-content:center;color:var(--mutedFaint);}
  .part-photo img{width:100%;height:100%;object-fit:cover;}
  .edit-btn{position:absolute;top:6px;right:6px;background:rgba(20,22,26,.75);border:none;border-radius:6px;padding:5px;cursor:pointer;color:var(--text);}
  .part-body{padding:12px;}
  .part-name{font-size:15px;font-weight:600;}
  .part-code{color:var(--mutedFaint);font-size:12px;font-family:'Prompt',sans-serif;margin-bottom:8px;}
  .machine-tag{color:var(--machine);font-size:11.5px;font-weight:700;margin-bottom:8px;display:flex;align-items:center;gap:4px;}
  .machine-select-row{display:flex;gap:8px;}
  .machine-select-row select{flex:1;}
  .machine-add-inline{margin-top:8px;display:flex;gap:8px;}
  .machine-add-inline input{flex:1;}
  .machine-add-inline button{white-space:nowrap;}
  .machine-group{border:1.5px solid var(--machine);border-radius:14px;padding:14px 14px 4px;margin-bottom:18px;background:#3B82F60A;}
  .machine-group.unassigned{border:1.5px dashed var(--border);background:transparent;}
  .machine-group-title{color:var(--machine);font-size:17px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:6px;}
  .machine-group.unassigned .machine-group-title{color:var(--mutedFaint);}
  .zoomable{cursor:zoom-in;}
  .lightbox-overlay{position:fixed;inset:0;background:rgba(8,9,11,.92);z-index:80;display:flex;align-items:center;justify-content:center;padding:20px;cursor:zoom-out;}
  .lightbox-overlay img{max-width:100%;max-height:100%;border-radius:10px;object-fit:contain;}
  .lightbox-close{position:absolute;top:16px;right:20px;background:rgba(20,22,26,.75);border:none;border-radius:8px;padding:8px 12px;color:var(--text);font-size:18px;cursor:pointer;}
  .gauge-top{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:4px;}
  .gauge-bar{background:var(--panelAlt);height:4px;border-radius:2px;overflow:hidden;}
  .gauge-fill{height:100%;transition:width .3s;}
  .withdraw-btn{width:100%;margin-top:10px;padding:8px 0;background:var(--panelAlt);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;}
  .withdraw-btn i{color:var(--accent);font-size:14px;}
  .btn i{font-size:14px;}
  .btn-accent i{color:#0A0C0E;}
  .empty{text-align:center;padding:40px 0;color:var(--mutedFaint);font-size:13px;}
  .hist-row{display:flex;align-items:center;gap:12px;padding:12px;background:var(--panel);border:1px solid var(--border);border-radius:10px;}
  .hist-icon{background:var(--panelAlt);border-radius:8px;padding:8px;display:flex;color:var(--accent);font-size:15px;}
  .overlay{position:fixed;inset:0;background:rgba(10,11,13,.7);z-index:50;display:flex;align-items:flex-end;justify-content:center;}
  @media(min-width:600px){.overlay{align-items:center;}}
  .modal{background:var(--panel);border:1px solid var(--border);border-radius:16px 16px 0 0;width:100%;max-width:420px;max-height:90vh;overflow-y:auto;}
  @media(min-width:600px){.modal{border-radius:16px;}}
  .modal-head{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--panel);}
  .modal-body{padding:20px;}
  .close-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:18px;}
  .photo-picker{width:120px;height:120px;border-radius:12px;background:var(--panelAlt);border:1px dashed var(--border);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;color:var(--mutedFaint);cursor:pointer;margin:0 auto 16px;overflow:hidden;}
  .photo-picker img{width:100%;height:100%;object-fit:cover;}
  .err-text{color:var(--danger);font-size:12px;margin-bottom:12px;}
  .notice{padding:14px;background:var(--warnDim);border:1px solid #F5A62344;border-radius:10px;margin-bottom:20px;font-size:12.5px;color:#F0D3A0;line-height:1.6;}
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--panel);border:1px solid var(--border);padding:10px 18px;border-radius:8px;font-size:13px;z-index:100;}
  .spin{animation:spin 1s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  a{color:var(--accent);}
  .login-screen{
    min-height:100vh;
    position:relative;
    overflow:hidden;
    background:
      radial-gradient(circle at 50% 0%, rgba(45,212,191,0.13), transparent 55%),
      radial-gradient(circle at 90% 85%, rgba(124,58,237,0.08), transparent 50%),
      repeating-linear-gradient(0deg, rgba(45,212,191,0.05) 0, rgba(45,212,191,0.05) 1px, transparent 1px, transparent 42px),
      repeating-linear-gradient(90deg, rgba(45,212,191,0.05) 0, rgba(45,212,191,0.05) 1px, transparent 1px, transparent 42px),
      radial-gradient(rgba(45,212,191,0.16) 1px, transparent 1.2px) 0 0/26px 26px,
      var(--bg);
  }
</style>
</head>

/* ---------------- helpers ---------------- */
function getPartZones(p){
  if (!p) return [];
  if (Array.isArray(p.zones)) return p.zones;
  if (p.zone) return [p.zone];
  return [];
}

function esc(s){ return (s ?? "").toString().replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }

function gaugeColor(qty, min){
  if (qty <= min) return "var(--danger)";
  if (qty <= min * 1.3) return "var(--warn)";
  return "var(--accent)";
}

function compressImage(file){
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onerror = () => reject(new Error("อ่านไฟล์รูปไม่สำเร็จ"));
    reader.onload = () => {
      const img = new Image();
      img.onerror = () => reject(new Error("โหลดรูปไม่สำเร็จ"));
      img.onload = () => {
        const maxW = 360;
        const scale = Math.min(1, maxW / img.width);
        const canvas = document.createElement("canvas");
        canvas.width = img.width * scale;
        canvas.height = img.height * scale;
        canvas.getContext("2d").drawImage(img, 0, 0, canvas.width, canvas.height);
        resolve(canvas.toDataURL("image/jpeg", 0.5));
      };
      img.src = reader.result;
    };
    reader.readAsDataURL(file);
  });
}

let toastTimer;
function showToast(msg){
  clearTimeout(toastTimer);
  let el = document.getElementById("toast");
  if (!el) {
    el = document.createElement("div");
    el.id = "toast";
    el.className = "toast";
    document.body.appendChild(el);
  }
  el.textContent = msg;
  el.style.display = "block";
  toastTimer = setTimeout(() => { el.style.display = "none"; }, 2600);
}

async function ensureMachine(name){

  if (existing) return existing.name;
  try {
    await addDoc(collection(db, "machines"), { name: name.trim(), createdAt: serverTimestamp() });
  } catch (e) {
    showToast("บันทึกเครื่องจักรใหม่ไม่สำเร็จ: " + e.message);
  }
  return name.trim();
}

async function savePart(data){
  saving = true; render();

    if (id) {

    } else {
      await addDoc(collection(db, "parts"), { ...rest, createdAt: serverTimestamp() });

  } catch (e) {

}

async function renameMachine(id, oldName, newName){
  const trimmed = newName.trim();
  if (!trimmed) { showToast("กรุณากรอกชื่อเครื่องจักร"); return; }
  if (trimmed === oldName) { editingMachineId = null; render(); return; }
  if (machines.find(m => m.id !== id && m.name.trim().toLowerCase() === trimmed.toLowerCase())) {
    showToast("มีชื่อเครื่องจักรนี้อยู่แล้ว"); return;
  }
  savingMachine = true; render();
  try {
    await updateDoc(doc(db, "machines", id), { name: trimmed });
    const affected = parts.filter(p => p.machine === oldName);
    await Promise.all(affected.map(p => updateDoc(doc(db, "parts", p.id), { machine: trimmed })));
    editingMachineId = null;
  } catch (e) {
    showToast("แก้ไขชื่อเครื่องจักรไม่สำเร็จ: " + e.message);
  } finally {
    savingMachine = false; render();
  }
}

function exportHistoryExcel(fromStr, toStr){
  if (typeof XLSX === "undefined") { showToast("โหลดตัวช่วยสร้าง Excel ไม่สำเร็จ ลองเช็คอินเทอร์เน็ต"); return; }
  let rows = history;
  if (fromStr || toStr) {
    const start = fromStr ? new Date(fromStr + "T00:00:00") : null;
    const end = toStr ? new Date(toStr + "T23:59:59") : new Date(fromStr + "T23:59:59");
    rows = history.filter(h => {
      if (!h.timestamp) return false;
      const d = h.timestamp.toDate ? h.timestamp.toDate() : new Date(h.timestamp);
      if (start && d < start) return false;
      if (end && d > end) return false;
      return true;
    });
  }
  if (rows.length === 0) { showToast("ไม่พบข้อมูลในช่วงที่เลือก"); return; }
  const data = rows.slice().reverse().map(h => ({
    "วันที่เวลา": fmtDate(h.timestamp),
    "ชื่ออะไหล่": h.partName || "",
    "รหัสอะไหล่": h.partCode || "",
    "จำนวนที่เบิก": h.qtyWithdrawn ?? "",
    "เครื่องที่ใช้": h.machine || "",
    "ผู้เบิก": h.by || "",
    "หมายเหตุ": h.note || "",
    "คงเหลือหลังเบิก": h.qtyAfter ?? ""
  }));
  const ws = XLSX.utils.json_to_sheet(data);
  ws["!cols"] = [{wch:18},{wch:22},{wch:12},{wch:12},{wch:22},{wch:18},{wch:20},{wch:14}];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "ประวัติการเบิก");
  const label = (fromStr && toStr && fromStr !== toStr) ? `${fromStr}_ถึง_${toStr}` : (fromStr || "ทั้งหมด");
  XLSX.writeFile(wb, `ประวัติการเบิก_${label}.xlsx`);
}

async function withdraw(part, qty, machine, by, note){
  saving = true; render();
  try {
    await runTransaction(db, async (tx) => {
      const ref_ = doc(db, "parts", part.id);
      const snap = await tx.get(ref_);
      if (!snap.exists()) throw new Error("ไม่พบอะไหล่นี้แล้ว");
      const current = snap.data().qty;
      if (qty > current) throw new Error("คลังเหลือแค่ " + current + " " + snap.data().unit);
      const qtyAfter = current - qty;
      tx.update(ref_, { qty: qtyAfter });
      const histRef = doc(collection(db, "history"));
      tx.set(histRef, {
        partId: part.id, partName: part.name, partCode: part.code,
        qtyWithdrawn: qty, qtyAfter, machine, by, note,
        timestamp: serverTimestamp()
      });
    });
    withdrawPart = null;
  } catch (e) {
    showToast("เบิกไม่สำเร็จ: " + e.message);
  } finally {
    saving = false; render();
  }
}

function renderDashboard(low, todayCount){
  // group low-stock items by zone, same convention as the history page:
  // an "all zones" part appears under every zone currently in use; items with no zone go under "unassigned".
  const allKnownZones = [...new Set(parts.flatMap(p => getPartZones(p)).filter(z => z && z !== "__all__"))];
  const zoneGroups = new Map();
  low.forEach(p => {
    const pz = getPartZones(p);
    let targetZones = pz.includes("__all__") ? allKnownZones : pz;
    if (!targetZones || targetZones.length === 0) targetZones = ["__unassigned__"];
    targetZones.forEach(key => {
      if (!zoneGroups.has(key)) zoneGroups.set(key, []);
      zoneGroups.get(key).push(p);
    });
  });
  const zoneKeys = [...zoneGroups.keys()].filter(k => k !== "__unassigned__").sort((a,b) => a.localeCompare(b, "th"));
  if (zoneGroups.has("__unassigned__")) zoneKeys.push("__unassigned__");

  return `
    <div class="stats">
      <div class="stat"><div class="lbl">รายการทั้งหมด</div><div class="val">${parts.length}</div></div>
      <div class="stat"><div class="lbl">ต่ำกว่า min</div><div class="val" style="color:${low.length?'var(--danger)':'var(--accent)'}">${low.length}</div></div>
      <div class="stat"><div class="lbl">เบิกวันนี้</div><div class="val">${todayCount}</div></div>
    </div>
    ${low.length > 0 ? `
    <div class="section-title"><i class="ti ti-bell-exclamation" style="color:var(--danger);" aria-hidden="true"></i> ต้องสั่งซื้อเพิ่ม</div>
    ${zoneKeys.map(key => {
      const isUnassigned = key === "__unassigned__";
      const items = zoneGroups.get(key);
      return `
      <div class="machine-group ${isUnassigned?"unassigned":""}">
        <div class="machine-group-title">${isUnassigned ? "ยังไม่ระบุโซน" : esc(key)} <span class="mono" style="color:var(--mutedFaint);font-weight:500;font-size:11px;">(${items.length})</span></div>
        <div class="card-list" style="margin-bottom:10px;">
          ${items.map(lowStockCardHtml).join("")}
        </div>
      </div>`;
    }).join("")}
    ` : ""}
    <div class="section-title">เบิกล่าสุด</div>
    ${history.length === 0 ? `<div class="empty">ยังไม่มีการเบิกอะไหล่</div>` :
      `<div class="card-list">${history.slice(0,5).map(histRow).join("")}</div>`}
  `;
}

function renderInventory(){
  const allZones = [...new Set(parts.flatMap(p => getPartZones(p)).filter(z => z && z !== "__all__"))].sort((a,b) => a.localeCompare(b, "th"));
  const filtered = parts.filter(p => {
    const pz = getPartZones(p);
    const matchesSearch = (p.name + p.code + (p.machine||"") + pz.join(" ")).toLowerCase().includes(search.toLowerCase());
    const matchesZone = !zoneFilter || pz.includes(zoneFilter) || pz.includes("__all__");
    return matchesSearch && matchesZone;
  });
  const zoneFilterHtml = `
    <div style="margin-bottom:12px;">
      <select id="zoneFilterSelect">
        <option value="">ทุกโซน</option>
        ${allZones.map(z => `<option value="${esc(z)}" ${zoneFilter===z?"selected":""}>${esc(z)}</option>`).join("")}
      </select>
    </div>`;
  if (filtered.length === 0) {
    return `
      <div class="search">
        <span class="icon">🔍</span>
        <input id="searchInput" placeholder="ค้นหาชื่อ รหัส หรือเครื่องจักร" value="${esc(search)}">
      </div>
      ${zoneFilterHtml}
      <div class="empty">ไม่พบอะไหล่ ลองเพิ่มรายการใหม่</div>
    `;
  }

  // group by machine name; parts without a machine go into "unassigned"
  const groups = new Map();
  filtered.forEach(p => {
    const key = p.machine && p.machine.trim() ? p.machine.trim() : "__unassigned__";
    if (!groups.has(key)) groups.set(key, []);
    groups.get(key).push(p);
  });
  const machineKeys = [...groups.keys()].filter(k => k !== "__unassigned__").sort((a,b) => a.localeCompare(b, "th"));
  if (groups.has("__unassigned__")) machineKeys.push("__unassigned__");

  return `
    <div class="search">
      <span class="icon">🔍</span>
      <input id="searchInput" placeholder="ค้นหาชื่อ รหัส หรือเครื่องจักร" value="${esc(search)}">
    </div>
    ${zoneFilterHtml}
    ${machineKeys.map(key => {
      const isUnassigned = key === "__unassigned__";
      const groupParts = groups.get(key);
      return `
      <div class="machine-group ${isUnassigned?"unassigned":""}">
        <div class="machine-group-title">${isUnassigned ? "ยังไม่ระบุเครื่องจักร" : esc(key)} <span class="mono" style="color:var(--mutedFaint);font-weight:500;font-size:11px;">(${groupParts.length})</span></div>
        <div class="parts-grid" style="margin-bottom:10px;">
          ${groupParts.map(partCardHtml).join("")}
        </div>
      </div>`;
    }).join("")}
  `;
}

function renderHistory(){
  const filtered = history.filter(h => ((h.partName||"")+(h.machine||"")+(h.by||"")).toLowerCase().includes(search.toLowerCase()));
  if (filtered.length === 0) {
    return `
      <div class="search">
        <span class="icon">🔍</span>
        <input id="searchInput" placeholder="ค้นหาตามอะไหล่ เครื่อง หรือผู้เบิก" value="${esc(search)}">
      </div>
      <div class="empty">ไม่พบประวัติ</div>
    `;
  }

  // group by the zone(s) of the related part; entries whose part has no zone (or part was deleted) go into "unassigned".
  // a part marked "all zones" appears under every zone currently in use; a part with several zones appears in each of them.
  const allKnownZones = [...new Set(parts.flatMap(p => getPartZones(p)).filter(z => z && z !== "__all__"))];
  const groups = new Map();
  filtered.forEach(h => {
    const part = parts.find(p => p.id === h.partId);
    const pz = getPartZones(part);
    let targetZones = pz.includes("__all__") ? allKnownZones : pz;
    if (!targetZones || targetZones.length === 0) targetZones = ["__unassigned__"];
    targetZones.forEach(key => {
      if (!groups.has(key)) groups.set(key, []);
      groups.get(key).push(h);
    });
  });
  const zoneKeys = [...groups.keys()].filter(k => k !== "__unassigned__").sort((a,b) => a.localeCompare(b, "th"));
  if (groups.has("__unassigned__")) zoneKeys.push("__unassigned__");

  return `
    <div class="search">
      <span class="icon">🔍</span>
      <input id="searchInput" placeholder="ค้นหาตามอะไหล่ เครื่อง หรือผู้เบิก" value="${esc(search)}">
    </div>
    ${zoneKeys.map(key => {
      const isUnassigned = key === "__unassigned__";
      const groupItems = groups.get(key);
      return `
      <div class="machine-group ${isUnassigned?"unassigned":""}">
        <div class="machine-group-title">${isUnassigned ? "ยังไม่ระบุโซน" : esc(key)} <span class="mono" style="color:var(--mutedFaint);font-weight:500;font-size:11px;">(${groupItems.length})</span></div>
        <div class="card-list" style="margin-bottom:10px;">
          ${groupItems.map(histRow).join("")}
        </div>
      </div>`;
    }).join("")}
  `;
}

/* ---------------- login events ---------------- */
function bindLoginEvents(){
  document.getElementById("roleUser")?.addEventListener("click", () => { loginShowPin = false; attemptLogin("user"); });
  document.getElementById("roleAdmin")?.addEventListener("click", () => {
    const nameEl = document.getElementById("loginName");
    if (nameEl) currentName = nameEl.value; // keep typed name before re-render shows the pin field
    loginShowPin = true; loginErr="";
    render();
    document.getElementById("loginPin")?.focus();
  });
  document.getElementById("btnLogin")?.addEventListener("click", () => attemptLogin(loginShowPin ? "admin" : "user"));
  document.getElementById("loginPin")?.addEventListener("keydown", (e) => { if (e.key === "Enter") attemptLogin("admin"); });
  document.getElementById("loginName")?.addEventListener("keydown", (e) => { if (e.key === "Enter" && !loginShowPin) attemptLogin("user"); });
}

function attemptLogin(role){
  const nameEl = document.getElementById("loginName");
  const name = nameEl ? nameEl.value.trim() : currentName;
  if (nameEl) currentName = nameEl.value; // preserve whatever was typed across re-renders
  if (!name) { loginErr = "กรุณากรอกชื่อของคุณ"; render(); document.getElementById("loginName")?.focus(); return; }
  if (role === "admin") {
    const pin = document.getElementById("loginPin")?.value || "";
    if (pin !== ADMIN_PIN) { loginErr = "รหัสผ่าน Admin ไม่ถูกต้อง"; loginShowPin = true; render(); return; }
  }
  currentName = name; currentRole = role; loginErr = "";
  localStorage.setItem("wk_name", name);
  localStorage.setItem("wk_role", role);
  render();
}

  }));
  document.getElementById("searchInput")?.addEventListener("input", (e) => {
    search = e.target.value; render();
    const el = document.getElementById("searchInput");
    if (el) { el.focus(); const p = search.length; el.setSelectionRange(p, p); }
  });
  document.getElementById("zoneFilterSelect")?.addEventListener("change", (e) => {
    zoneFilter = e.target.value; render();
  });

  // part form
  document.getElementById("closePart")?.addEventListener("click", () => { addOpen=false; editPart=null; showNewMachineInput=false; render(); });
  document.getElementById("fMachineSelect")?.addEventListener("change", (e) => {
    showNewMachineInput = e.target.value === "__new__";
    const wrap = document.getElementById("machineNewWrap");
    if (wrap) wrap.style.display = showNewMachineInput ? "flex" : "none";
    if (showNewMachineInput) document.getElementById("fMachineNew")?.focus();
  });
  document.getElementById("fZoneAll")?.addEventListener("change", (e) => {
    const list = document.getElementById("zoneCheckList");
    if (list) {
      list.style.opacity = e.target.checked ? ".4" : "1";
      list.style.pointerEvents = e.target.checked ? "none" : "auto";
    }
  });
  document.getElementById("btnAddZoneTag")?.addEventListener("click", () => {
    const input = document.getElementById("fZoneNew");
    const val = input?.value.trim();
    if (!val) return;
    const list = document.getElementById("zoneCheckList");
    const exists = [...document.querySelectorAll(".zoneCheckbox")].some(cb => cb.value === val);
    if (!exists && list) {
      const label = document.createElement("label");
      label.style.cssText = "display:flex;align-items:center;gap:5px;background:var(--panelAlt);border:1px solid var(--border);border-radius:8px;padding:6px 10px;font-size:12.5px;cursor:pointer;";
      label.innerHTML = `<input type="checkbox" class="zoneCheckbox" value="${val.replace(/"/g,"&quot;")}" checked> ${val.replace(/</g,"&lt;")}`;
      list.appendChild(label);
    } else {
      const cb = [...document.querySelectorAll(".zoneCheckbox")].find(c => c.value === val);
      if (cb) cb.checked = true;
    }
    input.value = "";
    input.focus();
  });
  document.getElementById("photoInput")?.addEventListener("change", async (e) => {
    const file = e.target.files?.[0]; if (!file) return;
    try {
      pendingPhotoBlob = await compressImage(file); // dataURL string
      render();
      const errEl = document.getElementById("photoErr");
      if (errEl) errEl.style.display = "none";
    } catch (err) {
      pendingPhotoBlob = null;
      render();
      const errEl = document.getElementById("photoErr");
      if (errEl) { errEl.textContent = "อัปโหลดรูปไม่สำเร็จ ลองรูปอื่น"; errEl.style.display = "block"; }
    }
  });
  document.getElementById("btnSavePart")?.addEventListener("click", async () => {
    const name = document.getElementById("fName").value.trim();
    const isAllZones = document.getElementById("fZoneAll")?.checked;
    const zones = isAllZones ? ["__all__"] : [...document.querySelectorAll(".zoneCheckbox:checked")].map(cb => cb.value);
    const code = document.getElementById("fCode").value.trim();
    const unit = document.getElementById("fUnit").value.trim() || "ชิ้น";
    const qty = Number(document.getElementById("fQty").value);
    const min = Number(document.getElementById("fMin").value);
    const errEl = document.getElementById("formErr");
    if (!name || !code) { errEl.textContent = "กรุณากรอกชื่อและรหัสอะไหล่"; errEl.style.display="block"; return; }
    const machineSelectVal = document.getElementById("fMachineSelect")?.value || "";
    let machine = "";
    if (machineSelectVal === "__new__") {
      const newName = document.getElementById("fMachineNew")?.value.trim() || "";
      if (!newName) { errEl.textContent = "กรุณากรอกชื่อเครื่องจักรใหม่ หรือเลือกเครื่องจักรที่มีอยู่"; errEl.style.display="block"; return; }
      machine = await ensureMachine(newName);
    } else {
      machine = machineSelectVal;
    }
    let photo = editPart?.photo || null;
    if (pendingPhotoBlob) photo = pendingPhotoBlob; // base64 dataURL string
    showNewMachineInput = false;
    await savePart({ id: editPart?.id, name, zones, code, unit, qty, min, machine, photo });
  });
  document.getElementById("btnDeletePart")?.addEventListener("click", () => {
    if (confirm("ยืนยันลบอะไหล่นี้?")) deletePart(editPart.id);
  });

  // withdraw form
  document.getElementById("closeWithdraw")?.addEventListener("click", () => { withdrawPart=null; render(); });
  document.getElementById("btnConfirmWithdraw")?.addEventListener("click", () => {
    const qty = Number(document.getElementById("wQty").value);
    const machine = document.getElementById("wMachine").value.trim();
    const by = document.getElementById("wBy").value.trim();
    const note = document.getElementById("wNote").value.trim();
    const errEl = document.getElementById("wErr");
    if (!qty || qty <= 0) { errEl.textContent="ระบุจำนวนให้ถูกต้อง"; errEl.style.display="block"; return; }
    if (qty > withdrawPart.qty) { errEl.textContent=`คลังเหลือแค่ ${withdrawPart.qty} ${withdrawPart.unit}`; errEl.style.display="block"; return; }
    if (!machine) { errEl.textContent="ระบุเครื่องที่นำไปใช้"; errEl.style.display="block"; return; }
    errEl.style.display="none";
    withdraw(withdrawPart, qty, machine, by, note);
  });
}

render();
</script>
</body>
</html>
